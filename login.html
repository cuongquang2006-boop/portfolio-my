<!DOCTYPE html>

<html lang="vi">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale:1.0">

        <title> Login</title>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

        <!-- css login  -->
        <link rel="stylesheet" href="css/login_page.css">

        <link rel="stylesheet" href="css/darkmodeforpage.css">

        <link rel="stylesheet" href="css/link.css">
        
    </head>

    <body>

            <section class="login-page">

                <div class="tech-side">

                    <i class="fa-brands fa-html5 html"></i>

                    <i class="fa-brands fa-css3-alt css"></i>

                    <i class="fa-brands fa-js js"></i>

                    <i class="fa-brands fa-java java"></i>

                    <i class="fa-solid fa-leaf spring"></i>

                    <i class="fa-brands fa-python python"></i>

                    <i class="fa-brands fa-react react"></i>

                    <i class="fa-brands fa-node-js node"></i>

                    <i class="fa-brands fa-github github"></i>

                    <i class="fa-brands fa-docker docker"></i>

                    <i class="fa-solid fa-database database"></i>

                    <i class="fa-brands fa-git-alt git"></i>

                </div>



                <div class="login-card">

                    <h1>

                        <a href="index.html" class="welcome-link">
                            Welcome,
                        </a>

                    </h1>

                    <p>

                        continue building amazing things with me.

                    </p>


                    <form class="login-form">

                        <input
                        type="email"

                        placeholder="Username">


                        <div class="password-box">

                            <input

                            type="password"

                            placeholder="Password">


                            <i class="fa-solid fa-eye"></i>

                        </div>


                        <button

                        class="btn-primary"

                        type="submit"
                        >

                             Login 

                        </button>

                    </form>

                </div>

                <button class="theme-btn">

                    <i class="fa-solid fa-moon"></i>

                </button>

            </section>



            <script src="js/darkmode.js"></script>

            <script src="js/main.js"></script>

    </body>


</html>
